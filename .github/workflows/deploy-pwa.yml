name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Inject repo name into PWA
        run: |
          sed -i "s|YOUR_GITHUB_USERNAME/pdfbot|${{ github.repository }}|g" pwa/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pwa/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
