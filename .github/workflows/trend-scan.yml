name: Trend Scan & Generate PDFs

on:
  schedule:
    - cron: '0 * * * *'      # every hour
  workflow_dispatch:           # manual trigger from PWA dashboard
    inputs:
      max_topics:
        description: 'Max PDFs to generate this run'
        default: '3'
        required: false

permissions:
  contents: write              # needed to commit data/ and create releases

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate PDFs
        working-directory: scripts
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GUMROAD_TOKEN:  ${{ secrets.GUMROAD_TOKEN }}
          BTC_ADDRESS:    ${{ secrets.BTC_ADDRESS }}
          PDF_PRICE_USD:  ${{ vars.PDF_PRICE_USD || '4.99' }}
          MAX_TOPICS:     ${{ inputs.max_topics || '3' }}
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python generate.py

      - name: Commit updated products.json
        run: |
          git config user.name  "pdf-bot[bot]"
          git config user.email "pdf-bot@users.noreply.github.com"
          git add data/products.json
          git diff --staged --quiet || git commit -m "chore: add new PDFs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
