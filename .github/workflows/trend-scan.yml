name: Trend Scan & Generate PDFs

on:
  schedule:
    - cron: '0 * * * *'      # every hour
  workflow_dispatch:           # manual trigger from PWA dashboard
    inputs:
      max_topics:
        description: 'Max PDFs to generate this run'
        default: '3'
        required: false

permissions:
  contents: write              # needed to commit data/ and create releases

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate PDFs
        working-directory: scripts
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GUMROAD_TOKEN:       ${{ secrets.GUMROAD_TOKEN }}
          BTC_ADDRESS:         ${{ secrets.BTC_ADDRESS }}
          PDF_PRICE_USD:       ${{ vars.PDF_PRICE_USD || '9.99' }}
          MAX_TOPICS:          ${{ inputs.max_topics || '3' }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          PINTEREST_TOKEN:      ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_BOARD_ID:   ${{ secrets.PINTEREST_BOARD_ID }}
          ETSY_API_KEY:         ${{ secrets.ETSY_API_KEY }}
          ETSY_SHOP_ID:         ${{ secrets.ETSY_SHOP_ID }}
          ETSY_REFRESH_TOKEN:   ${{ secrets.ETSY_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEVTO_API_KEY:        ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN:       ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUB_ID:      ${{ secrets.HASHNODE_PUB_ID }}
        run: python generate.py

      - name: Commit updated products.json
        run: |
          git config user.name  "pdf-bot[bot]"
          git config user.email "pdf-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: add new PDFs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger browser distribution on VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST:    ${{ secrets.VPS_HOST }}
          VPS_USER:    ${{ secrets.VPS_USER || 'root' }}
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "VPS_SSH_KEY or VPS_HOST not set — skipping browser distribute"
            exit 0
          fi
          echo "$VPS_SSH_KEY" > /tmp/vps_key && chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "cd /var/www/pyys/pdfbot && git pull --rebase && \
             REDDIT_USER=\$REDDIT_USER REDDIT_PASS=\$REDDIT_PASS \
             TWITTER_USER=\$TWITTER_USER TWITTER_PASS=\$TWITTER_PASS \
             MEDIUM_EMAIL=\$MEDIUM_EMAIL MEDIUM_PASS=\$MEDIUM_PASS \
             /var/www/pyys/stealth-browser-mcp/venv/bin/python scripts/browser_distribute.py >> /tmp/browser_distribute.log 2>&1 &"
